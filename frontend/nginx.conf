server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker Compose internal DNS (127.0.0.11). Using a variable here forces
    # nginx to resolve backend-service lazily (per request) instead of at
    # startup — preventing a crash when backend hasn't started yet.
    # In k8s the image uses a separate ConfigMap with the cluster resolver.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy API + admin SSR panel to the backend.
    location /api/ {
        set $backend http://backend-service:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        set $backend http://backend-service:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        set $backend http://backend-service:8000;
        proxy_pass $backend;
    }

    # SPA fallback — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
