{% extends "admin/base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2>Dashboard</h2>
<div class="stats-grid">
    <div class="stat-card"><h3>Użytkownicy</h3><p class="stat-value">{{ stats.users }}</p></div>
    <div class="stat-card"><h3>Posty</h3><p class="stat-value">{{ stats.posts }}</p></div>
    <div class="stat-card"><h3>Komentarze</h3><p class="stat-value">{{ stats.comments }}</p></div>
    <div class="stat-card"><h3>Załączniki</h3><p class="stat-value">{{ stats.attachments }}</p></div>
</div>
{% endblock %}
