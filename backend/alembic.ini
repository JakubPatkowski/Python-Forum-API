# Alembic configuration.
#
# `sqlalchemy.url` is intentionally empty here — env.py reads it from
# pydantic-settings (`app.config.settings.DATABASE_URL`), which in turn picks
# it up from environment variables. This keeps secrets out of repo.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# Use UTC for revision timestamps.
timezone = UTC

# Naming convention for revision files: <number>_<slug>.py
file_template = %%(rev)s_%%(slug)s

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
