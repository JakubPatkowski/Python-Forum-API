# Runs the k6 load test from inside the cluster, hitting the backend Service
# directly (so traffic is round-robined across all backend pods).
#
# The script comes from a ConfigMap named `k6-script` that you create from
# load/k6-load-test.js — scripts/run-load-test.ps1 does this for you:
#   kubectl create configmap k6-script \
#     --from-file=script.js=load/k6-load-test.js \
#     -n forum-wedkarskie --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f load/k6-job.yaml
#   kubectl logs -f job/k6-load -n forum-wedkarskie
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load
  namespace: forum-wedkarskie
  labels:
    app: k6
    app.kubernetes.io/part-of: forum-wedkarskie
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        # `app: k6` is what the full-lockdown backend NetworkPolicy allows.
        app: k6
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: grafana/k6:latest    # throwaway tooling — pin if you prefer
          args: ["run", "/scripts/script.js"]
          env:
            - name: BASE_URL
              value: "http://backend-service:8000"
            # Profil obciążenia: smoke | demo | stress (patrz load/k6-load-test.js).
            # run-load-test.ps1 podmienia tę wartość parametrem -TestProfile.
            - name: PROFILE
              value: "demo" # k6-profile-marker
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: script
              mountPath: /scripts
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1"
              memory: "256Mi"
      volumes:
        - name: script
          configMap:
            name: k6-script
