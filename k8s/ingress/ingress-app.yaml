# Ingress for the application — single clean entry host `forum.local`.
#
# Prerequisites:
#   minikube addons enable ingress
#   # add to your hosts file (Windows: C:\Windows\System32\drivers\etc\hosts):
#   #   <minikube ip>   forum.local
#   # scripts/deploy.ps1 prints the exact line to paste.
#
# All paths go to the frontend pod, whose nginx already reverse-proxies
# /api, /docs, /redoc, /openapi.json, /admin and /static to the backend
# (see k8s/frontend/configmap.yaml). So the SPA, the REST API and Swagger all
# live under http://forum.local.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forum-app
  namespace: forum-wedkarskie
  labels:
    app.kubernetes.io/part-of: forum-wedkarskie
  annotations:
    # Uploads can be up to 25 MB (MAX_UPLOAD_SIZE_BYTES) — give headroom.
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: forum.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
