# PodDisruptionBudget — keeps at least 1 backend pod serving during voluntary
# disruptions (node drain, rolling update, cluster upgrade). NOTE: the HPA can
# scale the backend down to minReplicas: 1; when only one pod is running this
# budget will block a voluntary eviction (e.g. node drain) until the HPA or a
# manual scale-up provides a second pod.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend
  namespace: forum-wedkarskie
  labels:
    app: backend
    app.kubernetes.io/part-of: forum-wedkarskie
spec:
  minAvailable: 1
  selector:
    # Target only the long-running Deployment pods, not the short-lived
    # migrate/cleanup Jobs (which also carry `app: backend`).
    matchLabels:
      app.kubernetes.io/name: backend
