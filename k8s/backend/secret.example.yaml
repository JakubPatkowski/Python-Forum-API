# Example backend secret (added in phase 1 — moves SECRET_KEY out of ConfigMap).
# Copy to `secret.yaml`, generate a strong key with:
#   openssl rand -hex 64
# Real file is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: forum-wedkarskie
type: Opaque
stringData:
  SECRET_KEY: REPLACE_ME_with_output_of_openssl_rand_hex_64
