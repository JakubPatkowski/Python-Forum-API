apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: forum-wedkarskie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: forum-wedkarskie-backend:latest
          # Na minikube używamy lokalnego obrazu, dlatego:
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            # MINIO_ACCESS_KEY / MINIO_SECRET_KEY (and unused MINIO_ROOT_*).
            - secretRef:
                name: minio-secret
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads-pvc
