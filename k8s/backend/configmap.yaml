apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: forum-wedkarskie
data:
  # Driver: psycopg3 — must match the package installed in pyproject.toml.
  DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres-service:5432/forum_wedkarskie"
  # NOTE: SECRET_KEY belongs in a Secret, not a ConfigMap. Kept here only
  # for the initial bootstrap; phase 1 will move it to backend-secrets.
  SECRET_KEY: "change-me-via-secret"
  DEBUG: "false"
  UPLOAD_DIR: "/app/uploads"
  MAX_UPLOAD_SIZE_BYTES: "26214400"
  MAX_COMMENT_DEPTH: "5"
  # --- MinIO -----------------------------------------------------------------
  # In-cluster endpoint the backend uses for all server-side object ops.
  MINIO_ENDPOINT: "minio-service:9000"
  # Endpoint embedded in presigned URLs (must be reachable by the BROWSER).
  # Replace <minikube-ip> with the output of `minikube ip` (NodePort 30900),
  # or point it at an ingress host for MinIO.
  MINIO_PUBLIC_ENDPOINT: "<minikube-ip>:30900"
  MINIO_BUCKET: "forum-files"
  MINIO_SECURE: "false"
  FILE_DOWNLOAD_URL_TTL_SECONDS: "3600"
  FILE_UPLOAD_URL_TTL_SECONDS: "900"
  FILE_ORPHAN_RETENTION_HOURS: "24"
  # MINIO_ACCESS_KEY / MINIO_SECRET_KEY come from the minio-secret (see
  # k8s/backend/deployment.yaml envFrom).
