apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: forum-wedkarskie
data:
  # Driver: psycopg3 — must match the package installed in pyproject.toml.
  DATABASE_URL: "postgresql+psycopg://postgres:postgres@postgres-service:5432/forum_wedkarskie"
  # NOTE: SECRET_KEY is intentionally NOT here. It is a credential and lives in
  # the `backend-secrets` Secret (see k8s/backend/secret.example.yaml and the
  # `secretRef` in deployment.yaml). Generate it with `openssl rand -hex 64`.
  DEBUG: "false"
  # --- DB connection pool ----------------------------------------------------
  # Budget: HPA maxReplicas(3) × (POOL_SIZE + MAX_OVERFLOW) = 60 < Postgres
  # max_connections (100). The old defaults (5+10) were exhausted under the
  # load test (30 s timeout -> readiness probes failed). Details: docs/20.
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT_SECONDS: "5"
  DB_POOL_RECYCLE_SECONDS: "1800"
  UPLOAD_DIR: "/app/uploads"
  MAX_UPLOAD_SIZE_BYTES: "26214400"
  MAX_COMMENT_DEPTH: "5"
  # Refresh-cookie hardening: set to "true" only when the app is served over
  # HTTPS (e.g. behind an ingress with TLS). Over plain HTTP it must stay
  # "false" or browsers drop the cookie.
  REFRESH_COOKIE_SECURE: "false"
  # --- MinIO -----------------------------------------------------------------
  # In-cluster endpoint the backend uses for all server-side object ops.
  MINIO_ENDPOINT: "minio-service:9000"
  # Endpoint embedded in presigned URLs (must be reachable by the BROWSER).
  # NOT <minikube-ip>:30900 — with the docker driver on Windows the node IP
  # (192.168.49.2) is unreachable from the host and `minikube tunnel` only
  # covers LoadBalancer/Ingress, never NodePort (see docs/19). Instead the
  # browser reaches MinIO through a kubectl port-forward started by
  # scripts/portforward.ps1 (localhost:30900 -> minio-service:9000).
  MINIO_PUBLIC_ENDPOINT: "localhost:30900"
  MINIO_BUCKET: "forum-files"
  MINIO_SECURE: "false"
  FILE_DOWNLOAD_URL_TTL_SECONDS: "3600"
  FILE_UPLOAD_URL_TTL_SECONDS: "900"
  FILE_ORPHAN_RETENTION_HOURS: "24"
  # MINIO_ACCESS_KEY / MINIO_SECRET_KEY come from the minio-secret (see
  # k8s/backend/deployment.yaml envFrom).
