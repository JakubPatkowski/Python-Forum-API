# =============================================================================
# Helm values for grafana/loki-stack = Loki (monolithic, single binary) +
# Promtail (log shipper). We DISABLE the bundled Grafana and Prometheus
# because kube-prometheus-stack already provides them; Loki is added there as
# a datasource (see values-kube-prometheus-stack.yaml -> additionalDataSources).
#
# Install (see scripts/install-monitoring.ps1):
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki grafana/loki-stack \
#     --namespace monitoring --create-namespace \
#     -f k8s/monitoring/values-loki-stack.yaml
#
# Result: Promtail tails every pod's stdout/stderr on the node and pushes to
# Loki at http://loki.monitoring:3100. In Grafana -> Explore -> Loki you can
# query e.g.  {namespace="forum-wedkarskie", app="backend"}
# =============================================================================

loki:
  enabled: true
  # Pin the Service name so the Grafana datasource URL is deterministic
  # (http://loki.monitoring.svc.cluster.local:3100). Without this the chart
  # derives the name from the release and the datasource URL can mismatch,
  # leaving Grafana's Loki datasource / log panels empty.
  fullnameOverride: loki
  isDefault: false
  # Disposable storage for a demo cluster. For persistence set
  # persistence.enabled: true and a size.
  persistence:
    enabled: false
  # FAILURE CAUSE (2026-06-13): during k6 tests the backend generates an
  # avalanche of logs; Loki hit its 384Mi RAM / 400m CPU limit and started
  # returning 503. Stalled Loki queries in Grafana hung for 50-100s (the
  # dashboard log panels refreshed every 10s), which clogged Grafana and caused
  # its restarts (SQLITE_BUSY + liveness timeout). We raise Loki's budget so it
  # survives the log influx and responds quickly -> Grafana stops choking.
  resources:
    requests:
      cpu: "150m"
      memory: "384Mi"
    limits:
      cpu: "800m"
      memory: "768Mi"
  # Looser probes: the default timeouts (1s) fell into 503/timeout when Loki was
  # busy indexing the k6 influx, which made the kubelet restart it in a loop.
  livenessProbe:
    initialDelaySeconds: 60
    timeoutSeconds: 10
    failureThreshold: 10
    periodSeconds: 15
  readinessProbe:
    initialDelaySeconds: 45
    timeoutSeconds: 10
    failureThreshold: 10
    periodSeconds: 15
  # Throttle the log ingestion rate so Loki doesn't balloon during load tests
  # (k6 generates A LOT of backend logs). These keys are stable across all Loki
  # versions in the loki-stack chart and merge safely with the chart's default
  # config (they don't overwrite whole storage/schema sections).
  config:
    limits_config:
      # A harder ingest limit - protects Loki from being flooded by k6 logs.
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      reject_old_samples: true
      reject_old_samples_max_age: 24h

promtail:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "150m"
      memory: "192Mi"

# Disable the components provided by kube-prometheus-stack instead.
grafana:
  enabled: false
prometheus:
  enabled: false
