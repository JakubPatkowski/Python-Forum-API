# =============================================================================
# Helm values for kube-prometheus-stack (Prometheus + Grafana + Alertmanager +
# node-exporter + kube-state-metrics) tuned for a single-node minikube.
#
# Install (see scripts/install-monitoring.ps1):
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     -f k8s/monitoring/values-kube-prometheus-stack.yaml
#
# Chart reference: https://github.com/prometheus-community/helm-charts
# (tested against chart 86.x — pin with `--version` for reproducibility).
# =============================================================================

# --- kubelet / cAdvisor ------------------------------------------------------
# Without this the container_cpu_* / container_memory_* metrics are missing and
# the "CPU/memory by pod" + "Kubernetes / Compute Resources" panels show
# "No data". The kube-prometheus-stack kubelet ServiceMonitor scrapes cAdvisor
# (/metrics/cadvisor) through the kubelet.
#
# On minikube the kubelet serves metrics over HTTPS with a self-signed cert.
# We must set insecureSkipVerify + use https scheme + pass the bearer token
# so Prometheus can actually scrape /metrics/cadvisor. Without these three
# settings the ServiceMonitor exists but scrapes return TLS errors or 401.
kubelet:
  enabled: true
  serviceMonitor:
    cAdvisor: true
    https: true
    insecureSkipVerify: true
    # Pass the pod's service-account bearer token so kubelet accepts the scrape.
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token

# --- Prometheus --------------------------------------------------------------
prometheus:
  prometheusSpec:
    # Discover ServiceMonitors/PodMonitors/Rules in ALL namespaces regardless
    # of their labels. Without this the operator only picks objects carrying
    # the Helm release label, and our app's ServiceMonitor would be ignored.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    # Stamp every scraped sample with cluster="forum-wedkarskie". The stock
    # kube-prometheus-stack dashboards (e.g. "Compute Resources / Namespace
    # (Pods)") filter every query by cluster="$cluster". On a fresh minikube the
    # metrics carry NO cluster label, so $cluster resolves to nothing and those
    # panels render "No data" even though kube-state-metrics/cAdvisor are healthy.
    # Adding an external label makes the operator attach it to all series, which
    # populates the $cluster dropdown and lights the stock dashboards back up.
    externalLabels:
      cluster: forum-wedkarskie
    # Short retention — this is a demo cluster, not long-term storage.
    # 3h is enough to review the k6 test results right after it finishes, and
    # it reduces the number of series kept in RAM (smaller footprint on 16 GB).
    retention: 3h
    # Hard cap on on-disk block size — protects against TSDB bloat during load
    # tests (many series = many samples).
    retentionSize: "1GB"
    # Keep the footprint small on minikube. Prometheus's RAM limit matters most
    # during k6 tests — with many series the head block can balloon; 768Mi is a
    # safe compromise for this scale.
    resources:
      requests:
        cpu: "100m"
        memory: "350Mi"
      limits:
        cpu: "800m"
        memory: "768Mi"
    # emptyDir storage (data is disposable). For persistence, add a
    # storageSpec with a volumeClaimTemplate here.

# --- Grafana -----------------------------------------------------------------
grafana:
  # Dev-only credentials — change before exposing Grafana anywhere shared.
  adminUser: admin
  adminPassword: admin
  defaultDashboardsEnabled: true        # ship the stock k8s/node dashboards
  # FAILURE CAUSE (RAM): Grafana 13.x with a 256Mi limit was killed by the
  # OOMKiller (exit code 137) — raised to 512Mi (RAM is no longer the problem,
  # the node sits at ~30%).
  #
  # FAILURE CAUSE (CPU) — diagnosed 2026-06-13 during k6 tests: under load (the
  # HPA scales the backend, the node jumps 210m -> 800m CPU) Grafana itself
  # wants ~301m CPU and HITS the 300m LIMIT. CFS throttles it, so it cannot
  # answer /api/health in time -> liveness 503 -> the kubelet restarts the pod.
  # This was NOT an OOM (zero exit 137, zero MemoryPressure), just CPU
  # starvation. We raise the CPU limit 300m -> 800m so Grafana survives the
  # peak during tests.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "800m"
      memory: "512Mi"
  # Disable features that are unnecessary for a demo and load memory/network at
  # startup: update checks and telemetry reporting. Smaller RAM footprint.
  env:
    GF_ANALYTICS_REPORTING_ENABLED: "false"
    GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
  # FAILURE CAUSE (2026-06-13): a dashboard with refresh=10s queried Prometheus
  # and Loki; when Loki was overloaded, /api/ds/query calls hung for 50-100s and
  # piled up, while Grafana concurrently tried to write to its SQLite database
  # (sessions, cleanup, annotations) -> "database is locked (SQLITE_BUSY)" ->
  # liveness /api/health timeout -> restart loop. The settings below remove that
  # load: a shorter query timeout (don't wait a minute on a dead datasource),
  # fewer expensive background jobs, fewer concurrent DB queries.
  grafana.ini:
    database:
      # SQLite with WAL handles concurrent read+write without SQLITE_BUSY.
      wal: true
    dataproxy:
      # Don't hang for minutes on an unhealthy datasource - cut it off after 20s.
      timeout: 20
      dialTimeout: 10
    # Less noise and fewer background jobs that hit the locked database.
    log:
      level: warn
    analytics:
      reporting_enabled: false
      check_for_updates: false
      check_for_plugin_updates: false
    # Disable automatic plugin fetching at startup (the logs showed
    # timeouts/permission denied on elasticsearch, lokiexplore, etc.).
    plugins:
      preinstall_disabled: true
  # Liveness with a longer startup: if Grafana's first start takes a while
  # (indexing), don't kill the pod immediately - otherwise it falls into a
  # restart loop. Additionally (2026-06-13): looser thresholds so a brief CPU
  # throttle during k6 tests doesn't end in a restart. failureThreshold=15 *
  # periodSeconds=15 = ~3.75 min of tolerance before the kubelet declares the
  # pod dead.
  livenessProbe:
    initialDelaySeconds: 90
    timeoutSeconds: 30
    failureThreshold: 15
    periodSeconds: 15
  # Readiness is also loosened: the default (1s timeout, 30s failure) falls into
  # "503 / context deadline exceeded" when Grafana is throttled, dropping it from
  # the endpoint and breaking the port-forward. We give it time to recover.
  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 15
    failureThreshold: 10
    periodSeconds: 15
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard          # ConfigMaps with this label are imported
      labelValue: "1"
      searchNamespace: ALL              # pick up our dashboard in any namespace
    datasources:
      enabled: true
      label: grafana_datasource
      searchNamespace: ALL
  # Wire Loki as a second datasource so logs and metrics live in one Grafana.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false
      # Per-query timeout to Loki: when Loki gets clogged, the logs panel returns
      # an error after 20s instead of hanging for a minute and blocking all of
      # Grafana.
      jsonData:
        timeout: 20
        maxLines: 500
  # Reachable at http://grafana.local once the ingress (k8s/ingress) is applied.
  # The ingress is optional - port-forward works too (scripts/portforward.ps1).

# --- Alertmanager ------------------------------------------------------------
# DISABLED: we don't send alerts (no receivers configured), and Alertmanager
# took ~128Mi RAM and generated noise. The alerting rules (prometheus-rules.yaml)
# still work and are visible in Prometheus -> Alerts - there is just no component
# to dispatch them anywhere. The reclaimed memory goes to Grafana.
alertmanager:
  enabled: false

# --- node-exporter + kube-state-metrics --------------------------------------
# These provide the node/pod CPU+memory metrics shown on the "Kubernetes /
# Compute Resources" dashboards (your "how much each pod uses" view).
nodeExporter:
  enabled: true
kube-state-metrics:
  resources:
    requests:
      cpu: "20m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Trim components that a single-node minikube control plane does not expose,
# to avoid noisy "target down" alerts during the demo.
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
