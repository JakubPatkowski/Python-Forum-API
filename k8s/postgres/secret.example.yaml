# Example PostgreSQL secret. Copy to `secret.yaml`, fill in real values,
# then `kubectl apply -f k8s/postgres/secret.yaml`.
# The real file is gitignored (see .gitignore).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: forum-wedkarskie
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: REPLACE_ME_with_strong_password
  POSTGRES_DB: forum_wedkarskie
