apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: forum-wedkarskie
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Uploads up to 25 MB (MAX_UPLOAD_SIZE_BYTES) pass through this proxy —
        # nginx's default limit is 1 MB, so any larger file got a 413 before
        # the request reached the backend. Headroom matches the ingress (30m).
        client_max_body_size 30m;

        # In k8s the backend-service ClusterIP is stable — no resolver trick needed.
        location /api/ {
            proxy_pass http://backend-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Swagger / OpenAPI — proxied so the API docs are reachable on the same
        # host as the SPA (http://forum.local/docs).
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://backend-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /admin/ {
            proxy_pass http://backend-service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            proxy_pass http://backend-service:8000;
        }

        # SPA fallback — React Router
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
