# HorizontalPodAutoscaler for the frontend (nginx serving the SPA).
# Lighter than the backend — static serving is cheap — so a smaller range.
# Requires metrics-server (minikube addons enable metrics-server).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: forum-wedkarskie
  labels:
    app: frontend
    app.kubernetes.io/part-of: forum-wedkarskie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Keep at least 1 frontend pod available during voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend
  namespace: forum-wedkarskie
  labels:
    app: frontend
    app.kubernetes.io/part-of: forum-wedkarskie
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
