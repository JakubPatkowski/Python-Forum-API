# Example MinIO secret. Copy to `secret.yaml`, fill in real values,
# then `kubectl apply -f k8s/minio/secret.yaml`. The real file is gitignored.
#
# One secret feeds BOTH workloads:
#   * the MinIO server reads MINIO_ROOT_USER / MINIO_ROOT_PASSWORD,
#   * the backend reads MINIO_ACCESS_KEY / MINIO_SECRET_KEY.
# Keep the access pair identical to the root pair (single-tenant dev setup).
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: forum-wedkarskie
type: Opaque
stringData:
  MINIO_ROOT_USER: REPLACE_ME
  MINIO_ROOT_PASSWORD: REPLACE_ME_with_strong_password
  MINIO_ACCESS_KEY: REPLACE_ME
  MINIO_SECRET_KEY: REPLACE_ME_with_strong_password
