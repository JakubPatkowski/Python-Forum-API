# CodeQL — GitHub-native static application security testing (SAST).
#
# Analyses both languages in the repo (Python backend, JS/JSX frontend) with
# the "security-extended" query suite. Findings appear in the repository's
# Security > Code scanning tab as SARIF; this workflow itself sends no email or
# chat notifications.
name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan (Mondays 03:27 UTC) catches newly-published query updates.
    - cron: '27 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # required to upload SARIF to code scanning

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
