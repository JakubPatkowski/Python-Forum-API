# Build and publish the backend & frontend container images to the GitHub
# Container Registry (ghcr.io).
#
# Notes:
#   * Auth uses the built-in GITHUB_TOKEN — no extra secrets to manage.
#   * On pull requests the images are built (to prove the Dockerfiles still
#     work) but NOT pushed.
#   * docker/metadata-action derives a rich, lower-cased tag set (branch, PR,
#     semver from git tags, short SHA, and "latest" on the default branch).
#   * BuildKit layer cache is persisted between runs via the GitHub Actions
#     cache backend (type=gha) for fast incremental builds.
name: Docker Images

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # Single-arch keeps PR builds fast; flip to linux/amd64,linux/arm64
          # here if multi-arch images are needed.
          platforms: linux/amd64
          provenance: false
