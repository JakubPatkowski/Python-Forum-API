services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — single-node, dev-only credentials, ephemeral volume.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forum_wedkarskie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app run with uv. The bind-mount of ./backend gives
  # hot reload during development; uv resolves dependencies at build time.
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/forum_wedkarskie
      SECRET_KEY: dev-secret-key-change-me
      DEBUG: "true"
      UPLOAD_DIR: /app/uploads
      # MinIO — backend talks to "minio:9000"; presigned URLs use
      # "localhost:9000" so the browser can reach the bucket directly.
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: forum-files
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      # Keep the prebuilt venv from the image; the bind-mount above would
      # otherwise hide it under the host's empty directory.
      - backend_venv:/app/.venv
    # Apply migrations on every dev boot, then start uvicorn with reload.
    # NOTE: bash -c (not -lc) — login shell sources /etc/profile which resets
    # PATH and drops /app/.venv/bin, making alembic/uvicorn invisible.
    command: >
      bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/live\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      default:
        aliases:
          - backend-service

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for all uploaded files.
  # Console (web UI) on :9001, S3 API on :9000.
  # ---------------------------------------------------------------------------
  minio:
    # Pinned release tag (not :latest) for deterministic, reproducible builds.
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API (also used by presigned URLs from the browser)
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # One-shot job: wait for MinIO, then create the bucket. Backend waits for
  # this to complete so the bucket always exists before the app boots.
  createbuckets:
    # Pinned release tag (not :latest) for deterministic, reproducible builds.
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 1;
      done;
      mc mb --ignore-existing local/forum-files;
      echo 'bucket forum-files ready';
      "

  # ---------------------------------------------------------------------------
  # Frontend — Vite production build served by nginx.
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_venv:
  minio_data:
