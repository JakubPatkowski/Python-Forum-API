<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1240" height="500" viewBox="0 0 1240 500" xmlns="http://www.w3.org/2000/svg">
<style><![CDATA[
*{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;display:flex;justify-content:center;padding:30px;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif}
  svg{background:#0d1117;border-radius:14px}
  .title{fill:#e6edf3;font-size:28px;font-weight:700}
  .step-t{font-size:18px;font-weight:700}
  .step-s{font-size:13px;fill:#8b949e}
  .step-l{font-size:13px;fill:#e6edf3}
  .err{font-size:15px;font-weight:700;fill:#f85149}
]]></style>
  <defs>
    <marker id="ra" markerWidth="8" markerHeight="8" refX="2" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <text x="620" y="52" text-anchor="middle" class="title">HTTP request lifecycle — application layers</text>

  <!-- 5 boxes, width 196, gap 36 -> arrows live IN the gap -->
  <!-- Router -->
  <g>
    <rect x="40" y="150" width="196" height="150" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
    <rect x="40" y="150" width="196" height="8" rx="4" fill="#d29922"/>
    <text x="138" y="190" text-anchor="middle" class="step-t" fill="#d29922">Router</text>
    <text x="138" y="212" text-anchor="middle" class="step-s">(FastAPI)</text>
    <text x="138" y="250" text-anchor="middle" class="step-l">DTO → command</text>
    <text x="138" y="274" text-anchor="middle" class="step-l">requires(perm)</text>
  </g>
  <!-- Use Case -->
  <g>
    <rect x="276" y="150" width="196" height="150" rx="10" fill="#161b22" stroke="#39c5bb" stroke-width="2"/>
    <rect x="276" y="150" width="196" height="8" rx="4" fill="#39c5bb"/>
    <text x="374" y="190" text-anchor="middle" class="step-t" fill="#39c5bb">Use Case</text>
    <text x="374" y="212" text-anchor="middle" class="step-s">(application)</text>
    <text x="374" y="250" text-anchor="middle" class="step-l">business logic</text>
    <text x="374" y="274" text-anchor="middle" class="step-l">returns Result[T,E]</text>
  </g>
  <!-- Aggregate -->
  <g>
    <rect x="512" y="150" width="196" height="150" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <rect x="512" y="150" width="196" height="8" rx="4" fill="#3fb950"/>
    <text x="610" y="190" text-anchor="middle" class="step-t" fill="#3fb950">Aggregate</text>
    <text x="610" y="212" text-anchor="middle" class="step-s">(domain)</text>
    <text x="610" y="250" text-anchor="middle" class="step-l">validate invariants</text>
    <text x="610" y="274" text-anchor="middle" class="step-l">record_event()</text>
  </g>
  <!-- Repository -->
  <g>
    <rect x="748" y="150" width="196" height="150" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <rect x="748" y="150" width="196" height="8" rx="4" fill="#58a6ff"/>
    <text x="846" y="190" text-anchor="middle" class="step-t" fill="#58a6ff">Repository</text>
    <text x="846" y="212" text-anchor="middle" class="step-s">(infrastructure)</text>
    <text x="846" y="250" text-anchor="middle" class="step-l">ORM ↔ entity (mapper)</text>
    <text x="846" y="274" text-anchor="middle" class="step-l">UnitOfWork.commit()</text>
  </g>
  <!-- Event Bus -->
  <g>
    <rect x="984" y="150" width="196" height="150" rx="10" fill="#161b22" stroke="#6e7bff" stroke-width="2"/>
    <rect x="984" y="150" width="196" height="8" rx="4" fill="#6e7bff"/>
    <text x="1082" y="190" text-anchor="middle" class="step-t" fill="#6e7bff">Event Bus</text>
    <text x="1082" y="212" text-anchor="middle" class="step-s">(infrastructure)</text>
    <text x="1082" y="250" text-anchor="middle" class="step-l">pull_events()</text>
    <text x="1082" y="274" text-anchor="middle" class="step-l">publish after commit</text>
  </g>

  <!-- arrows centered in 40px gaps, not touching boxes -->
  <!-- each gap between boxes is 40px wide (e.g. 236->276). Arrows centered so the
       margin (box right -> line start) equals (arrow tip -> next box left) = 12px. -->
  <g stroke="#8b949e" stroke-width="2.5" marker-end="url(#ra)">
    <line x1="248" y1="225" x2="258" y2="225"/>
    <line x1="484" y1="225" x2="494" y2="225"/>
    <line x1="720" y1="225" x2="730" y2="225"/>
    <line x1="956" y1="225" x2="966" y2="225"/>
  </g>

  <!-- error envelope box -->
  <rect x="40" y="350" width="1140" height="100" rx="12" fill="rgba(248,81,73,.08)" stroke="#f85149" stroke-width="1.5"/>
  <text x="620" y="388" text-anchor="middle" class="err">Err(DomainError) → global exception handler</text>
  <text x="620" y="416" text-anchor="middle" class="step-l" font-size="14">envelope <tspan font-family="monospace">{ error: { code, message, field } }</tspan> + HTTP status (404 / 403 / 409 / 422)</text>
</svg>
