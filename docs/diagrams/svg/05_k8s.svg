<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1240" height="670" viewBox="0 0 1240 670" xmlns="http://www.w3.org/2000/svg">
<style><![CDATA[
*{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;display:flex;justify-content:center;padding:30px;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif}
  svg{background:#0d1117;border-radius:14px}
  .title{fill:#e6edf3;font-size:27px;font-weight:700}
  .ns{fill:#8b949e;font-size:14px;font-weight:600}
  .grp-label{font-size:13px;font-weight:700;letter-spacing:.4px}
  .box-title{font-size:16px;font-weight:700;fill:#fff}
  .box-line{font-size:12.5px;fill:#e6edf3}
  .box-mut{font-size:12px;fill:#8b949e}
  .port{font-size:11.5px;font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;fill:#d29922}
  .flow{font-size:12px;font-weight:600;}
  .pill{font-size:11px;font-weight:700;fill:#fff}
  .foot{font-size:12px;fill:#8b949e}
]]></style>

<defs>
  <marker id="fa" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#58a6ff"/>
  </marker>
  <marker id="fp" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#a371f7"/>
  </marker>
  <marker id="fg" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#3fb950"/>
  </marker>
  <marker id="fy" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#d29922"/>
  </marker>
  <marker id="fo" markerWidth="9" markerHeight="9" refX="6" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="context-stroke"/>
  </marker>
</defs>

<!-- TITLE -->
<text x="620" y="42" text-anchor="middle" class="title">Kubernetes deployment (minikube)</text>

<!-- CLUSTER BORDER (FIXED HEIGHT) -->
<rect x="24" y="62" width="1192" height="594" rx="14" fill="#11161d" stroke="#30363d" stroke-width="1.5"/>
<text x="44" y="88" class="ns">minikube cluster · namespace: forum-wedkarskie</text>

<!-- USER -->
<rect x="44" y="116" width="150" height="58" rx="10" fill="#161b22" stroke="#a371f7" stroke-width="1.5"/>
<text x="119" y="143" text-anchor="middle" class="box-title" font-size="14">User / Browser</text>
<text x="119" y="163" text-anchor="middle" class="box-mut">http://forum.local</text>

<!-- INGRESS -->
<rect x="44" y="232" width="180" height="96" rx="10" fill="#1a2332" stroke="#58a6ff" stroke-width="2"/>
<text x="134" y="258" text-anchor="middle" class="box-title">Ingress (nginx)</text>
<text x="134" y="280" text-anchor="middle" class="box-line">host: forum.local</text>
<text x="134" y="300" text-anchor="middle" class="port">/ → frontend</text>
<text x="134" y="318" text-anchor="middle" class="port">/api → backend</text>

<line x1="119" y1="174" x2="119" y2="230" stroke="#a371f7" stroke-width="2" marker-end="url(#fp)"/>

<!-- FRONTEND -->
<rect x="290" y="116" width="240" height="120" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
<text x="410" y="144" text-anchor="middle" class="box-title">Deployment: frontend</text>
<text x="410" y="166" text-anchor="middle" class="box-line">nginx + React (Vite build)</text>
<text x="410" y="186" text-anchor="middle" class="port">Service :80 · containerPort 80</text>
<text x="410" y="205" text-anchor="middle" class="box-mut">HPA 1–2 · target CPU 70%</text>

<rect x="358" y="214" width="48" height="15" rx="7" fill="#3fb950"/>
<text x="382" y="225" text-anchor="middle" class="pill">pod 1</text>

<rect x="414" y="214" width="48" height="15" rx="7" fill="#3fb950" opacity=".5"/>
<text x="438" y="225" text-anchor="middle" class="pill">pod 2</text>

<!-- BACKEND -->
<rect x="290" y="270" width="370" height="150" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
<text x="475" y="297" text-anchor="middle" class="box-title">Deployment: backend (FastAPI)</text>
<text x="475" y="319" text-anchor="middle" class="port">Service :8000 · containerPort 8000 · /metrics</text>
<text x="475" y="339" text-anchor="middle" class="box-mut">HPA 1–3 (CPU 70%) · PDB · non-root uid 1000</text>
<text x="475" y="357" text-anchor="middle" class="box-mut">requests 100m/128Mi · limits 500m/512Mi</text>

<rect x="361" y="378" width="56" height="20" rx="10" fill="#58a6ff"/>
<text x="389" y="392" text-anchor="middle" class="pill">pod 1</text>

<rect x="447" y="378" width="56" height="20" rx="10" fill="#58a6ff"/>
<text x="475" y="392" text-anchor="middle" class="pill">pod 2</text>

<rect x="533" y="378" width="56" height="20" rx="10" fill="#58a6ff" opacity=".5"/>
<text x="561" y="392" text-anchor="middle" class="pill">pod 3</text>

<!-- POSTGRES -->
<rect x="720" y="116" width="230" height="118" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
<text x="835" y="144" text-anchor="middle" class="box-title">StatefulSet: postgres 16</text>
<text x="835" y="166" text-anchor="middle" class="port">Service :5432 (ClusterIP)</text>
<text x="835" y="186" text-anchor="middle" class="box-line">PVC 1Gi · replicas 1</text>
<text x="835" y="210" text-anchor="middle" class="box-mut">NetworkPolicy: backend only</text>

<!-- MINIO -->
<rect x="720" y="270" width="230" height="118" rx="10" fill="#161b22" stroke="#d29922" stroke-width="2"/>
<text x="835" y="298" text-anchor="middle" class="box-title">MinIO (S3)</text>
<text x="835" y="320" text-anchor="middle" class="port">:9000 S3 · :9001 console</text>
<text x="835" y="340" text-anchor="middle" class="box-line">PVC 5Gi · bucket-job</text>
<text x="835" y="364" text-anchor="middle" class="box-mut">pics / uploads</text>

<!-- JOBS -->
<rect x="982" y="116" width="208" height="84" rx="10" fill="#161b22" stroke="#39c5bb" stroke-width="1.5"/>
<text x="1086" y="142" text-anchor="middle" class="box-title" font-size="14">Job: backend-migrate</text>
<text x="1086" y="163" text-anchor="middle" class="box-mut">alembic upgrade head</text>
<text x="1086" y="182" text-anchor="middle" class="box-mut">(runs once, pre-deploy)</text>

<rect x="982" y="216" width="208" height="84" rx="10" fill="#161b22" stroke="#39c5bb" stroke-width="1.5"/>
<text x="1086" y="242" text-anchor="middle" class="box-title" font-size="14">CronJob: cleanup</text>
<text x="1086" y="263" text-anchor="middle" class="box-mut">cleanup_orphan_files.py</text>
<text x="1086" y="282" text-anchor="middle" class="box-mut">removes orphan uploads</text>

<rect x="982" y="316" width="208" height="72" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5" stroke-dasharray="6 5"/>
<text x="1086" y="343" text-anchor="middle" class="box-title" fill="#f85149">Secrets</text>
<text x="1086" y="364" text-anchor="middle" class="box-mut">backend / postgres / minio</text>

<!-- FLOWS -->
<line x1="224" y1="262" x2="288" y2="200" stroke="#58a6ff" stroke-width="2" marker-end="url(#fa)"/>
<line x1="224" y1="300" x2="288" y2="338" stroke="#58a6ff" stroke-width="2" marker-end="url(#fa)"/>
<line x1="660" y1="318" x2="718" y2="195" stroke="#3fb950" stroke-width="2" marker-end="url(#fg)"/>
<text x="713" y="175" class="flow" fill="#3fb950" text-anchor="end">SQL :5432</text>
<line x1="660" y1="345" x2="718" y2="330" stroke="#d29922" stroke-width="2" marker-end="url(#fy)"/>
<text x="713" y="372" class="flow" fill="#d29922" text-anchor="end">S3 :9000</text>

<!-- OBSERVABILITY -->
<rect x="44" y="446" width="1146" height="96" rx="10" fill="#101820" stroke="#a371f7" stroke-width="1.5"/>
<text x="617" y="470" text-anchor="middle" class="grp-label" fill="#a371f7">
OBSERVABILITY (Helm: kube-prometheus-stack + loki-stack)
</text>

<rect x="78" y="482" width="260" height="46" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
<text x="208" y="510" text-anchor="middle" class="box-line" fill="#d29922" font-weight="700">Prometheus</text>

<rect x="350" y="482" width="260" height="46" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
<text x="480" y="510" text-anchor="middle" class="box-line" fill="#d29922" font-weight="700">Grafana</text>

<rect x="622" y="482" width="260" height="46" rx="8" fill="#161b22" stroke="#39c5bb" stroke-width="1.5"/>
<text x="752" y="510" text-anchor="middle" class="box-line" fill="#39c5bb" font-weight="700">Loki (logs)</text>

<rect x="894" y="482" width="260" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
<text x="1024" y="503" text-anchor="middle" class="box-line" fill="#58a6ff" font-weight="700">ServiceMonitor</text>
<text x="1024" y="520" text-anchor="middle" class="box-mut">scrapes backend /metrics</text>

<line x1="410" y1="420" x2="410" y2="444" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#fo)"/>

<!-- SECURITY -->
<rect x="44" y="560" width="1146" height="86" rx="10" fill="#1a1012" stroke="#f85149" stroke-width="1.5"/>
<text x="62" y="586" class="grp-label" fill="#f85149">SECURITY &amp; HARDENING</text>
<text x="62" y="610" class="box-line">NetworkPolicy: default-deny-ingress + explicit allow rules</text>
<text x="62" y="632" class="box-line">imagePullPolicy: Never (local minikube images) · SecurityHeaders + upload-size-limit middleware · PDB on backend</text>

</svg>